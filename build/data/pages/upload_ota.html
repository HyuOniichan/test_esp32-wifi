<!DOCTYPE html>
<html>

<head>
    <title>ESP32 Upload</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>

    <div class="container">

        <h2>OTA Update</h2>

        <input type="file" id="otaFile" />
        <button onclick="uploadFirmware()">Upload</button>

        <progress id="otaUploadProgress" value="0" max="100"></progress>

    </div>

    <script>
        function uploadFirmware() {
            let file = document.getElementById("otaFile").files[0];
            let formData = new FormData();
            formData.append("file", file);

            // Maybe better for multipart upload
            let xhr = new XMLHttpRequest();

            xhr.open("POST", "/api/ota", true);

            // progress
            xhr.upload.onprogress = function (e) {
                if (e.lengthComputable) {
                    let percent = (e.loaded / e.total) * 100;
                    document.getElementById("progress").value = percent;
                }
            };

            xhr.onload = function () {
                if (xhr.status == 200) {
                    alert("OTA success! Rebooting...");
                } else {
                    alert("OTA failed");
                }
            };

            xhr.send(formData);
        }
    </script>

</body>

</html>
