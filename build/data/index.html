<!DOCTYPE html>
<html>

<head>
    <title>ESP32 Dashboard</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>

    <div class="container">

        <h2>ESP32 Dashboard</h2>

        <!-- WiFi Status -->
        <div style="margin-top:20px;">
            <h3>WiFi Status</h3>

            <p><b>SSID:</b> <span id="ssidText">Loading...</span></p>
            <p><b>Mode:</b> <span id="modeText">Loading...</span></p>
            <p><b>IP:</b> <span id="ipText">Loading...</span></p>
        </div>

        <!-- Actions -->
        <div style="margin-top:25px;">
            <a href="/config/wifi"><button>Configure WiFi</button></a>
            <a href="/upload/ota"><button>Upload OTA</button></a>
        </div>

        <button onclick="refreshData()" style="background:#28a745;">
            Refresh
        </button>

    </div>

    <script>
        function refreshData() {
            fetch("/api/wifi")
                .then((res) => res.json())
                .then((data) => {
                    document.getElementById("ssidText").innerText = data.ssid || "N/A";
                    document.getElementById("modeText").innerText = data.mode || "N/A";
                    document.getElementById("ipText").innerText = data.ip || "N/A";
                })
                .catch((err) => {
                    document.getElementById("ssidText").innerText = "Error";
                    document.getElementById("modeText").innerText = "Error";
                    document.getElementById("ipText").innerText = "Error";
                });
        }
    </script>

</body>

</html>
