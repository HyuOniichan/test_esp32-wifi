<!DOCTYPE html>
<html>

<head>
    <title>ESP32 Dashboard</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>

    <div class="container">

        <h2>ESP32 Dashboard</h2>

        <!-- WiFi Status -->
        <div style="margin-top:20px;">
            <h3>WiFi Status</h3>

            <p><b>SSID:</b> <span id="ssidText">Loading...</span></p>
            <p><b>Mode:</b> <span id="modeText">Loading...</span></p>
            <p><b>IP:</b> <span id="ipText">Loading...</span></p>
        </div>

        <!-- Actions -->
        <div style="margin-top:25px;">
            <a href="/config/wifi">
                <button>Configure WiFi</button>
            </a>
        </div>

        <div style="margin-top:10px;">
            <button onclick="refreshData()" style="background:#28a745;">
                Refresh
            </button>
        </div>

    </div>

    <!-- littlefs load as /app.js instead of app.js -->
    <script src="/app.js"></script>

</body>

</html>
