<!DOCTYPE html><html><head><title>ESP32 Config</title><link rel="stylesheet" href="/style.css"></head><body><div class="container"><h2>WiFi Config</h2><label>Mode</label> <select id="selectMode"><option value="STA">STA</option><option value="AP">AP</option><option value="DUAL">DUAL</option></select> <label>WiFi Name (SSID)</label> <input type="text" id="ssidInput" placeholder="Enter WiFi name"> <label>Password</label> <input type="password" id="passInput" placeholder="Enter password"> <label>MAC Address</label> <input type="text" id="macInput" placeholder="02:11:22:33:44:55"> <button onclick="connectWiFi()">Connect</button></div><script>function connectWiFi(){const e=document.getElementById("selectMode").value,t=document.getElementById("ssidInput").value,n=document.getElementById("passInput").value,s=document.getElementById("macInput").value;alert("Mode: "+e+"\nSSID: "+t+"\nPassword: "+n+"\nMAC Address: "+s),fetch("/api/wifi",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({mode:e,ssid:t,pass:n,mac:s})}).then(e=>e.json()).then(e=>{alert(e.status||"OK")})}</script></body></html>
