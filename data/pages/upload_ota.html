<!DOCTYPE html><html><head><title>ESP32 Upload</title><link rel="stylesheet" href="/style.css"></head><body><div class="container"><h2>OTA Update</h2><input type="file" id="otaFile"> <button onclick="uploadFirmware()">Upload</button><progress id="otaUploadProgress" value="0" max="100"></progress></div><script>function uploadFirmware(){let e=document.getElementById("otaFile").files[0],t=new FormData;t.append("file",e);let o=new XMLHttpRequest;o.open("POST","/api/ota",!0),o.upload.onprogress=function(e){if(e.lengthComputable){let t=e.loaded/e.total*100;document.getElementById("progress").value=t}},o.onload=function(){200==o.status?alert("OTA success! Rebooting..."):alert("OTA failed")},o.send(t)}</script></body></html>
